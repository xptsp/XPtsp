;====================================================================================
; Format of Component Selection strings:
;   String ID  = Component | Description of Component
CS1   =Create Restore Point|Creates a System Restore point.

CS2   =Hex-Edit|Hex-Edit system files.
CS2A  =UXTHEME.DLL|Patches uxtheme.dll so that 3rd party visual styles can be used.
CS2B  =SFC_OS.DLL|Patches SFC_OS.DLL so that unsigned driver messages don't appear.

CS3   =Files|Patches ALL files.
CS3A  =EXE Files|Patches all executable (.exe) files.
CS3B  =DLL Files|Patches all dynamic link library (.dll) files.
CS3C  =CPL Files|Patches all control panel (.cpl) files.
CS3D  =OCX Files|Patches all ole control extension (.ocx) files.
CS3E  =Administrative Tools|Patches Administrative Tools.
CS3F  =OE Files|Patches Outlook Express / Address Book.
CS3G  =IE Files|Patches Internet Explorer.
CS3H  =WMP11 Files|Patches Windows Media Player 11.
CS3I  =RDC6 Files|Patches Remote Desktop Connection 6.
CS3J  =MCE Files|Patches Windows Media Center.
CS3K  =OOBE Files|Replaces Out Of Box Experience files.
CS3L  =NetMeeting Files|Patches NetMeeting files.

CS4   =Extra Stuff|Install miscellaneous files.
CS4A  =Boot Screen|Replaces XP bootscreen with Vista bootscreen.
CS4B  =Screensaver|Replaces XP screensaver with Vista screensaver.
CS4C  =Wallpaper|Replaces default XP wallpaper with different wallpaper.
CS4D  =Visual Themes|Replaces the Luna visual theme and shell style.
CS4E  =Vista Sound Pack|Replaces default XP sounds with Vista sounds.
CS4F  =User Account Pictures|Replaces default UAP pictures with Vista pictures.
CS4G  =Aero Cursors|Substitute Aero cursors within Default Theme.
CS4H  =Segoe UI Fonts|Installs the Segoe UI fonts for better login appearance.
CS4I  =Use Custom AutoPlay|Replace AutoPlay program with custom AutoPlay.

CS5   =Additional Programs|Installs additional programs on the system.
CS5C  =QTTab|Adds a Vista-like address bar and tabbed browsing for Explorer.
CS5D  =UberIcon v1.4|Adds special effects to your icons when you double-click on them.
CS5E  =Visual Task Tips|Shows a thumbnail of a window by putting the mouse cursor over a taskbar button.
CS5F  =Transparent Bar|Adjusts taskbar transparency so that wallpaper behind the taskbar is partially visible.
CS5G  =TrueTransparency|Changes the windows border adding png support and so true transparency.
CS5H  =ViStart|Replaces Start Menu with a Vista-like Start Menu emulator.
CS5I  =CAD 2009|CAD 2009 EDITION is a CTRL-ALT-DEL replacement, Vista style!
CS5J  =WinFlip|A Flip 3D function for Windows XP.

CS6   =Program Resources|Include various components of XPtsp on your system.
CS6A  =Repatcher|Include the ability to repatch updated components at reboot.
CS6B  =OEM Info Generator|Gathers information about your OS installation.
CS6C  =Resources|Include Resource Package so updated files can be repatched.
QTBAR=QTTab|Adds a Vista-like address bar and tabbed browsing for Explorer.
UBER=UberIcon v1.4|Adds special effects to your icons when you double-click on them.
TASKTIPS=Visual Task Tips|Shows a thumbnail of a window by putting the mouse cursor over a taskbar button.
TBAR=Transparent Bar|Adjusts taskbar transparency so that wallpaper behind the taskbar is partially visible.
TTran=TrueTransparency v1.3.0|Changes the windows border adding png support and so true transparency.
ViStart=ViStart|Replaces Start Menu with a Vista-like Start Menu emulator.
CAD=CAD 2009|CAD 2009 EDITION is a CTRL-ALT-DEL replacement, Vista style!
FLIP=WinFlip|A Flip 3D function for Windows XP.
UAP=User Account Pictures|Replaces default UAP pictures with Vista pictures.
AERO=Aero Cursors|Includes the Vista Aero cursors in your operating system.
FONT=Segoe UI Fonts|Installs the Segoe UI fonts for better login appearance.

